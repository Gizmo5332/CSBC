<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Community Southern Baptist Church | Fair Grove, Missouri</title>
<meta name="description" content="A family of imperfect people, coming together, to worship a perfect God. Community Southern Baptist Church — Fair Grove, Missouri." />

<!-- React CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --navy:       #162040;
    --navy-mid:   #1e2d52;
    --navy-light: #243460;
    --gold:       #c9a84c;
    --gold-light: #e8c97a;
    --cream:      #f5f0e8;
    --white:      #ffffff;
    --gray-light: #e8eaf0;
    --gray:       #8a93a8;
    --text-body:  #d0d6e8;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Source Sans 3', system-ui, sans-serif;
    --radius:     8px;
    --shadow:     0 4px 24px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--navy);
    color: var(--text-body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(22, 32, 64, 0.97);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo-cross {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }
  .logo-text .l1 {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .logo-text .l2 {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .desktop-nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .nav-link {
    background: none;
    border: none;
    color: var(--text-body);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    letter-spacing: 0.03em;
  }
  .nav-link:hover { color: var(--gold); background: rgba(201,168,76,0.08); }
  .nav-link.active { color: var(--gold); }
  .nav-cta {
    background: var(--gold);
    color: var(--navy);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-left: 8px;
  }
  .nav-cta:hover { background: var(--gold-light); transform: translateY(-1px); }
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    flex-direction: column;
    gap: 5px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: var(--navy-mid);
    border-top: 1px solid rgba(201,168,76,0.15);
    padding: 12px 20px 20px;
    gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-nav-link {
    background: none;
    border: none;
    color: var(--text-body);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 500;
    padding: 10px 0;
    text-align: left;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: color 0.2s;
  }
  .mobile-nav-link:hover, .mobile-nav-link.active { color: var(--gold); }
  .mobile-cta {
    margin-top: 12px;
    background: var(--gold);
    color: var(--navy);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 700;
    padding: 12px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  @media (max-width: 768px) {
    .desktop-nav { display: none; }
    .hamburger { display: flex; }
  }

  /* ── PAGE WRAPPER ── */
  .page { padding-top: 64px; }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 92dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(160deg, #0d1630 0%, #1a2744 40%, #1e3060 100%);
  }
  .hero-bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(45deg, var(--gold) 0, var(--gold) 1px, transparent 0, transparent 50%);
    background-size: 24px 24px;
  }
  .hero-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 40px 24px;
    max-width: 760px;
  }
  .hero-eyebrow {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 8vw, 72px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.05;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .hero-title .gold { color: var(--gold); }
  .hero-subtitle {
    font-family: var(--font-display);
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 400;
    font-style: italic;
    color: var(--text-body);
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .hero-tagline {
    font-size: 15px;
    color: var(--gray);
    margin-bottom: 40px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  .hero-ctas {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    padding: 13px 28px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-outline {
    background: transparent;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    padding: 13px 28px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .hero-scroll {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--gray);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }
  .hero-scroll svg { opacity: 0.5; }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* ── SECTION COMMONS ── */
  .section { padding: 80px 24px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .section-sub {
    font-size: 16px;
    color: var(--text-body);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 48px;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    margin: 16px 0 40px;
  }
  .alt-bg { background: var(--navy-mid); }
  .dark-bg { background: #0d1630; }

  /* ── KNOW GROW GO STRIP ── */
  .kgg-strip {
    background: var(--gold);
    padding: 0;
  }
  .kgg-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  .kgg-item {
    padding: 28px 32px;
    text-align: center;
    border-right: 1px solid rgba(22,32,64,0.15);
  }
  .kgg-item:last-child { border-right: none; }
  .kgg-word {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    color: var(--navy);
    display: block;
    margin-bottom: 4px;
  }
  .kgg-desc {
    font-size: 13px;
    color: rgba(22,32,64,0.7);
    font-weight: 500;
  }
  @media (max-width: 500px) {
    .kgg-inner { grid-template-columns: 1fr; }
    .kgg-item { border-right: none; border-bottom: 1px solid rgba(22,32,64,0.15); }
    .kgg-item:last-child { border-bottom: none; }
  }

  /* ── SCHEDULE ── */
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .schedule-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .schedule-card:hover { border-color: rgba(201,168,76,0.5); }
  .schedule-time {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    display: block;
    margin-bottom: 6px;
  }
  .schedule-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .schedule-note {
    font-size: 12px;
    color: var(--gray);
  }

  /* ── QUICK CTAS ── */
  .quick-ctas {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .quick-card {
    background: var(--navy-light);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .quick-card:hover {
    background: var(--navy-mid);
    border-color: rgba(201,168,76,0.3);
    transform: translateY(-3px);
  }
  .quick-icon { font-size: 28px; }
  .quick-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }
  .quick-sub { font-size: 13px; color: var(--gray); }

  /* ── CHILDREN CALLOUT ── */
  .children-banner {
    background: linear-gradient(135deg, var(--navy-light) 0%, #2a3d70 100%);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 40px 32px;
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .children-text { flex: 1; min-width: 220px; }
  .children-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 8px;
  }
  .children-sub { font-size: 15px; color: var(--text-body); margin-bottom: 20px; }
  .children-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .children-emoji { font-size: 64px; flex-shrink: 0; }

  /* ── SERMON ── */
  .sermon-placeholder {
    background: var(--navy-light);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    aspect-ratio: 16/9;
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .sermon-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(201,168,76,0.05) 0%, transparent 60%);
  }
  .sermon-placeholder:hover { border-color: rgba(201,168,76,0.4); }
  .play-btn {
    width: 64px;
    height: 64px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .play-btn::after {
    content: '';
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent var(--navy);
    margin-left: 3px;
  }
  .sermon-label {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--white);
    position: relative;
    z-index: 1;
  }
  .sermon-sub { font-size: 13px; color: var(--gray); position: relative; z-index: 1; }

  /* ── EVENTS ── */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .event-card {
    background: var(--navy-light);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.2s;
  }
  .event-card:hover { transform: translateY(-3px); border-color: rgba(201,168,76,0.3); }
  .event-date-bar {
    background: var(--gold);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .event-month {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--navy);
  }
  .event-day {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1;
  }
  .event-body { padding: 18px; }
  .event-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .event-desc { font-size: 13px; color: var(--gray); line-height: 1.5; }

  /* ── PRAYER ── */
  .prayer-form-wrap {
    background: var(--navy-light);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    padding: 40px 32px;
    max-width: 560px;
    margin: 0 auto;
  }
  .form-group { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-body);
    margin-bottom: 7px;
    letter-spacing: 0.03em;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 11px 14px;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
  }
  .form-textarea { resize: vertical; min-height: 120px; }
  .form-hint { font-size: 12px; color: var(--gray); margin-top: 5px; }

  /* ── CHURCH IDENTITY (ABOUT) ── */
  .identity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .identity-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: var(--radius);
    padding: 28px;
    transition: border-color 0.2s, background 0.2s;
  }
  .identity-card:hover {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.04);
  }
  .identity-scripture {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .identity-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 10px;
  }
  .identity-desc { font-size: 14px; color: var(--text-body); line-height: 1.6; }

  /* ── STAFF ── */
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .staff-card {
    background: var(--navy-light);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    overflow: hidden;
    text-align: center;
    transition: transform 0.15s;
  }
  .staff-card:hover { transform: translateY(-3px); }
  .staff-photo {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    border-bottom: 2px solid rgba(201,168,76,0.2);
  }
  .staff-body { padding: 20px 16px; }
  .staff-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
  }
  .staff-role {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .staff-bio { font-size: 13px; color: var(--gray); line-height: 1.55; }

  /* ── BELIEVE ── */
  .believe-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .believe-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .believe-check {
    width: 20px;
    height: 20px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .believe-check::after {
    content: '';
    width: 5px;
    height: 9px;
    border-right: 2px solid var(--navy);
    border-bottom: 2px solid var(--navy);
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .believe-text { font-size: 14px; color: var(--text-body); line-height: 1.5; }
  .believe-ref { font-size: 12px; color: var(--gold); margin-top: 3px; }

  /* ── ACCORDION (CONNECT MINISTRIES) ── */
  .accordion { display: flex; flex-direction: column; gap: 8px; }
  .acc-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);

function App() {

  const handleSetPage = (p) => {
    setPage(p);
    window.scrollTo({top:0, behavior:'smooth'});
  };

  const renderPage = () => {
    switch(page) {
      case 'Home':      return <HomePage setPage={handleSetPage}/>;
      case 'About':     return <AboutPage/>;
      case 'Gospel':    return <GospelPage setPage={handleSetPage}/>;
      case 'Connect':   return <ConnectPage/>;
      case 'Resources': return <ResourcesPage/>;
      case 'Give':      return <GivePage/>;
      default:          return <HomePage setPage={handleSetPage}/>;
    }
  };

  return (
    <div>
      <Header page={page} setPage={handleSetPage}/>
      <main className="page">{renderPage()}</main>
      <Footer setPage={handleSetPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
