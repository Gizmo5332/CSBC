<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Community Southern Baptist Church | Fair Grove, Missouri</title>
<meta name="description" content="A family of imperfect people, coming together, to worship a perfect God. Community Southern Baptist Church — Fair Grove, Missouri." />

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --navy:       #3f4359;
    --teal-dark:  #456a68;
    --teal:       #679e9b;
    --teal-mid:   #559ca4;
    --teal-light: #84bcc2;
    --teal-pale:  #9ac4b3;
    --charcoal:   #444444;
    --gray-bg:    #eaeaea;
    --gray-mid:   #d8d8d8;
    --white:      #ffffff;
    --text-dark:  #333333;
    --text-mid:   #666666;
    --script:     'Caveat', cursive;
    --sans:       'Montserrat', sans-serif;
    --radius:     6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--gray-bg);
    color: var(--text-dark);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--navy);
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .header-top {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 20px 10px;
  }
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    gap: 2px;
  }
  .logo-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    mix-blend-mode: screen;
  }
  .logo-name {
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white);
    line-height: 1;
  }
  .logo-sub {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal-pale);
    line-height: 1;
  }
  .logo-location {
    font-family: var(--script);
    font-size: 17px;
    color: var(--teal-light);
    line-height: 1;
  }
  .header-nav {
    background: #2c2d2e;
    width: 100%;
    position: relative;
  }
  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 0;
  }
  .nav-item {
    position: relative;
  }
  .nav-link {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    padding: 12px 18px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.2s, color 0.2s;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
  }
  .nav-link:hover { background: rgba(255,255,255,0.08); color: var(--teal-light); }
  .nav-link.active { color: var(--teal-light); border-bottom-color: var(--teal); }

  /* Dropdown */
  .nav-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: #2c2d2e;
    min-width: 200px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    z-index: 200;
    flex-direction: column;
  }
  .nav-item:hover .nav-dropdown { display: flex; }
  .nav-dropdown-link {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    padding: 11px 20px;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap;
  }
  .nav-dropdown-link:hover { background: rgba(255,255,255,0.1); color: var(--teal-light); }

  /* Mobile nav */
  .hamburger {
    display: none;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    flex-direction: column;
    gap: 5px;
    padding: 4px;
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--white);
    border-radius: 2px;
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: #2c2d2e;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .mobile-menu.open { display: flex; }
  .mobile-nav-link {
    background: none;
    border: none;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
    padding: 13px 20px;
    text-align: left;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    transition: background 0.2s;
  }
  .mobile-nav-link:hover { background: rgba(255,255,255,0.08); }
  .mobile-nav-link.active { color: var(--teal-light); }

  @media (max-width: 680px) {
    .nav-inner { display: none; }
    .hamburger { display: flex; }
    .header-top { position: relative; }
  }

  /* ── PAGE ── */
  .page { padding-top: 148px; }
  @media (max-width: 680px) { .page { padding-top: 120px; } }

  /* ── HERO ── */
  .hero {
    background: var(--teal);
    position: relative;
    overflow: hidden;
    min-height: 460px;
    display: flex;
    align-items: center;
  }
  .hero-globe {
    position: absolute;
    right: -60px;
    top: -60px;
    width: 500px;
    height: 500px;
    opacity: 0.15;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 60px 40px;
    max-width: 600px;
  }
  .hero-welcome {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.8);
    margin-bottom: 6px;
  }
  .hero-title {
    font-family: var(--sans);
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 800;
    color: var(--white);
    line-height: 0.95;
    letter-spacing: -0.01em;
    margin-bottom: 24px;
  }
  .hero-mission {
    font-size: clamp(22px, 5vw, 38px);
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }
  .hero-tagline {
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
    max-width: 420px;
  }

  /* ── QUICK CARDS ── */
  .quick-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    background: var(--gray-bg);
    padding: 40px 40px;
    max-width: 900px;
    margin: 0 auto;
  }
  @media (max-width: 600px) {
    .quick-cards { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 24px 16px; }
  }
  .quick-card {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s;
  }
  .quick-card:hover { opacity: 0.88; }
  .quick-card-label {
    font-family: var(--script);
    font-size: 28px;
    font-weight: 600;
    color: var(--text-dark);
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .qc-globe {
    position: absolute;
    bottom: -20px;
    left: -20px;
    width: 120px;
    height: 120px;
    opacity: 0.3;
  }
  .qc-1 { background: #8fbfb8; }
  .qc-2 { background: var(--teal); }
  .qc-3 { background: var(--teal-dark); }
  .qc-4 { background: #067885; }
  .qc-5 { background: var(--teal-mid); }
  .qc-6 { background: #84bcc2; }

  /* ── SECTION COMMONS ── */
  .section { padding: 70px 40px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal-dark);
    margin-bottom: 8px;
  }
  .section-title {
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .section-sub {
    font-size: 15px;
    color: var(--text-mid);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 40px;
  }
  .divider {
    width: 48px;
    height: 3px;
    background: var(--teal);
    border-radius: 2px;
    margin: 14px 0 36px;
  }
  .white-bg { background: var(--white); }
  .teal-bg { background: var(--teal); }
  .charcoal-bg { background: var(--charcoal); }
  .gray-bg { background: var(--gray-bg); }

  @media (max-width: 680px) { .section { padding: 50px 20px; } }

  /* ── SCHEDULE ── */
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .schedule-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-top: 4px solid var(--teal);
  }
  .schedule-time {
    font-size: 32px;
    font-weight: 800;
    color: var(--teal-dark);
    display: block;
    margin-bottom: 6px;
  }
  .schedule-name {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-dark);
    margin-bottom: 4px;
  }
  .schedule-note { font-size: 12px; color: var(--text-mid); }

  /* ── KNOW GROW GO ── */
  .kgg-strip { background: var(--teal-dark); }
  .kgg-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  .kgg-item {
    padding: 28px 24px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  .kgg-item:last-child { border-right: none; }
  .kgg-word {
    font-size: 26px;
    font-weight: 800;
    color: var(--white);
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .kgg-desc { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 500; }
  @media (max-width: 500px) {
    .kgg-inner { grid-template-columns: 1fr; }
    .kgg-item { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .kgg-item:last-child { border-bottom: none; }
  }

  /* ── CHILDREN CALLOUT ── */
  .children-banner {
    background: var(--teal-light);
    border-radius: var(--radius);
    padding: 36px 32px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }
  .children-text { flex: 1; min-width: 220px; }
  .children-title { font-size: 22px; font-weight: 800; color: var(--white); margin-bottom: 8px; }
  .children-sub { font-size: 14px; color: rgba(255,255,255,0.9); margin-bottom: 16px; line-height: 1.6; }
  .children-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    background: rgba(255,255,255,0.25);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .children-emoji { font-size: 56px; flex-shrink: 0; }
  @media (max-width: 600px) { .children-emoji { display: none; } }

  /* ── SERMON PLACEHOLDER ── */
  .sermon-placeholder {
    background: var(--teal-dark);
    border-radius: var(--radius);
    aspect-ratio: 16/9;
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .sermon-placeholder:hover { opacity: 0.88; }
  .play-btn {
    width: 60px; height: 60px;
    background: var(--white);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .play-btn::after {
    content: '';
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent var(--teal-dark);
    margin-left: 3px;
  }
  .sermon-label { font-size: 16px; font-weight: 700; color: var(--white); }
  .sermon-sub { font-size: 12px; color: rgba(255,255,255,0.7); }

  /* ── EVENTS ── */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }
  .event-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: transform 0.15s;
  }
  .event-card:hover { transform: translateY(-2px); }
  .event-date-bar {
    background: var(--teal);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .event-month { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.8); }
  .event-day { font-size: 30px; font-weight: 800; color: var(--white); line-height: 1; }
  .event-body { padding: 16px; }
  .event-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
  .event-desc { font-size: 13px; color: var(--text-mid); line-height: 1.5; }

  /* ── PRAYER FORM ── */
  .prayer-form-wrap {
    background: var(--white);
    border-radius: var(--radius);
    padding: 36px 32px;
    max-width: 540px;
    margin: 0 auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-mid);
    margin-bottom: 6px;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--gray-bg);
    border: 1px solid var(--gray-mid);
    border-radius: var(--radius);
    padding: 10px 13px;
    color: var(--text-dark);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--teal); }
  .form-textarea { resize: vertical; min-height: 110px; }
  .form-hint { font-size: 11px; color: var(--text-mid); margin-top: 4px; }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--teal);
    color: var(--white);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 26px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--teal-dark); transform: translateY(-1px); }
  .btn-outline {
    background: transparent;
    color: var(--teal);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 26px;
    border-radius: var(--radius);
    border: 2px solid var(--teal);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--teal); color: var(--white); }
  .btn-white {
    background: var(--white);
    color: var(--teal-dark);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 700;
    padding: 12px 26px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    transition: opacity 0.2s;
  }
  .btn-white:hover { opacity: 0.88; }

  /* ── IDENTITY CARDS ── */
  .identity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }
  .identity-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    border-left: 4px solid var(--teal);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .identity-scripture { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--teal-dark); margin-bottom: 6px; }
  .identity-name { font-size: 17px; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; }
  .identity-desc { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

  /* ── STAFF ── */
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .staff-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: transform 0.15s;
  }
  .staff-card:hover { transform: translateY(-2px); }
  .staff-photo {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--teal-pale) 0%, var(--teal-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .staff-body { padding: 18px 14px; }
  .staff-name { font-size: 17px; font-weight: 800; color: var(--text-dark); margin-bottom: 3px; }
  .staff-role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--teal-dark); margin-bottom: 10px; }
  .staff-bio { font-size: 12px; color: var(--text-mid); line-height: 1.55; }

  /* ── BELIEVE ── */
  .believe-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .believe-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 12px 14px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .believe-check {
    width: 18px; height: 18px;
    background: var(--teal);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
  }
  .believe-check::after {
    content: '';
    width: 4px; height: 8px;
    border-right: 2px solid var(--white);
    border-bottom: 2px solid var(--white);
    transform: rotate(45deg) translate(-1px,-1px);
  }
  .believe-text { font-size: 13px; color: var(--text-dark); line-height: 1.5; }
  .believe-ref { font-size: 11px; color: var(--teal-dark); margin-top: 2px; font-weight: 600; }

  /* ── ACCORDION ── */
  .accordion { display: flex; flex-direction: column; gap: 6px; }
  .acc-item {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
    border-left: 4px solid transparent;
    transition: border-color 0.2s;
  }
  .acc-item.open { border-left-color: var(--teal); }
  .acc-header {
    width: 100%;
    background: none;
    border: none;
    padding: 15px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    text-align: left;
    gap: 12px;
  }
  .acc-title { font-size: 15px; font-weight: 700; color: var(--text-dark); }
  .acc-arrow { width: 18px; height: 18px; flex-shrink: 0; color: var(--teal); transition: transform 0.3s; }
  .acc-item.open .acc-arrow { transform: rotate(180deg); }
  .acc-body { padding: 0 18px 16px; font-size: 13px; color: var(--text-mid); line-height: 1.65; display: none; }
  .acc-item.open .acc-body { display: block; }

  /* ── GOSPEL STEPS ── */
  .gospel-steps { display: flex; flex-direction: column; gap: 0; max-width: 620px; margin: 0 auto; }
  .gospel-step { display: flex; gap: 20px; align-items: flex-start; padding-bottom: 36px; position: relative; }
  .gospel-step:last-child { padding-bottom: 0; }
  .step-number {
    width: 40px; height: 40px;
    background: var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: var(--white);
    flex-shrink: 0; position: relative; z-index: 1;
  }
  .gospel-step:not(:last-child) .step-number::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);

function App() {
  const [page, setPage] = useState('Home');
  const handleSetPage = (p) => { setPage(p); window.scrollTo({top:0, behavior:'smooth'}); };
  const renderPage = () => {
    switch(page) {
      case 'Home':                 return <HomePage setPage={handleSetPage}/>;
      case 'About':                return <AboutPage setPage={handleSetPage}/>;
      case 'Staff':                return <StaffPage/>;
      case 'Our Purpose':          return <OurPurposePage/>;
      case 'Contact':              return <ContactPage/>;
      case 'What We Believe':      return <WhatWeBelievePage/>;
      case 'Membership':           return <MembershipPage/>;
      case 'Service Times':        return <ServiceTimesPage/>;
      case 'Gospel':               return <GospelPage setPage={handleSetPage}/>;
      case 'Connect':              return <ConnectPage setPage={handleSetPage}/>;
      case 'Volunteer Opportunities': return <VolunteerPage/>;
      case 'Discipleship':         return <DiscipleshipPage/>;
      case 'Childcare':            return <ChildcarePage/>;
      case 'Prek-5th Grade':       return <KidsPage/>;
      case 'Youth':                return <YouthPage/>;
      case 'Men':                  return <MenPage/>;
      case 'Women':                return <WomenPage/>;
      case 'Music':                return <MusicPage/>;
      case 'Connect Groups':       return <ConnectGroupsPage/>;
      case 'Missions':             return <MissionsPage/>;
      case 'Events':               return <EventsPage/>;
      case 'Resources':            return <ResourcesPage setPage={handleSetPage}/>;
      case 'Watch Messages':       return <WatchMessagesPage/>;
      case 'Online Bulletin':      return <OnlineBulletinPage/>;
      case 'Counseling':           return <CounselingPage/>;
      case 'Online Giving':        return <OnlineGivingPage/>;
      case 'Church Center':        return <ChurchCenterPage/>;
      case 'Merch Shop':           return <MerchShopPage/>;
      case 'Give':                 return <GivePage/>;
      default:                     return <HomePage setPage={handleSetPage}/>;
    }
  };
  return (
    <div>
      <Header page={page} setPage={handleSetPage}/>
      <main className="page">{renderPage()}</main>
      <Footer setPage={handleSetPage}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
